name: Update Problem Count

on:
  push:
    branches: [ main ]
    paths:
      - '[0-9]*/**'   # runs only when rating folders change

jobs:
  update-count:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Count total problems
      run: |
        total=$(find . -type d -regex './[0-9]+/[^/]*' | wc -l)
        echo "Total problems: $total"

        # create updated count.json
        cat > count.json << EOF
{
  "schemaVersion": 1,
  "label": "problems solved",
  "message": "$total",
  "color": "brightgreen"
}
EOF

    - name: Commit and push count.json
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add count.json

        git diff --cached --quiet || git commit -m "update problem count"
        git push