name: Update Problem Count

on:
  push:
    branches: [ main ]
    paths:
      - '[0-9]*/**'   # only numeric folders like 800/, 900/

permissions:
  contents: write

jobs:
  update-count:
    # avoid infinite loop when commit to count.json
    if: "!contains(github.event.head_commit.message, 'update problem count')"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Count total problems
      run: |
        total=$(find . -mindepth 2 -maxdepth 2 -type d | wc -l)
        echo "Total problems: $total"

        cat > count.json << EOF
{
  "schemaVersion": 1,
  "label": "problems solved",
  "message": "$total",
  "color": "brightgreen"
}
EOF

    - name: Commit and push count.json
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add count.json

        git diff --cached --quiet || git commit -m "update problem count"

        git pull --rebase
        git push