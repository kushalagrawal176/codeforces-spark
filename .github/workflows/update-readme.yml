name: Update Problem Count

on:
  push:
    paths:
      - "solutions/**"
      - "!README.md"

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Count problems
        run: |
          COUNT=$(find solutions -type f | wc -l)
          echo "PROBLEM_COUNT=$COUNT" >> $GITHUB_ENV
      - name: Update README
        run: |
          sed -i "s/<!-- PROBLEM_COUNT -->/${PROBLEM_COUNT}/g" README.md
      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update problem count to ${PROBLEM_COUNT}" || echo "No changes"
          git push
