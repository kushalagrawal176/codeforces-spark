name: Update Total Problem Count

on:
  push:
    branches: [ main ]
    paths:
      - '[0-9]*/**'   # triggers only when numeric folders change

jobs:
  update-count:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Count problems and update README
      run: |
        # count folders inside numeric directories (like 800/problem1)
        total=$(find . -type d -regex './[0-9]+/[^/]*' | wc -l)

        echo "Total problems: $total"

        # update README using marker
        sed -i "s/<!--COUNT--> [0-9]\+/<!--COUNT--> $total/" README.md

    - name: Commit and push changes
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add README.md

        # commit only if there are changes
        git diff --cached --quiet || git commit -m "Update total problem count"
        git push