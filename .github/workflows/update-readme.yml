name: Update Problem Count

on:
  push:
    paths:
      - "codeforces/**"
      - "!README.md"

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Count problems
        run: |
          PROBLEM_COUNT=0
          for d in codeforces/*; do
            if [ -d "$d" ] && [[ $(basename "$d") =~ ^[0-9]+$ ]]; then
              # count only immediate subdirectories (each problem is a folder)
              COUNT=$(find "$d" -maxdepth 1 -type d ! -path "$d" | wc -l)
              PROBLEM_COUNT=$((PROBLEM_COUNT + COUNT))
            fi
          done
          echo "PROBLEM_COUNT=$PROBLEM_COUNT" >> $GITHUB_ENV

      - name: Update README
        run: |
          sed -i "s/<!-- PROBLEM_COUNT -->/${PROBLEM_COUNT}/g" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update problem count to ${PROBLEM_COUNT}" || echo "No changes to commit"
          git push
